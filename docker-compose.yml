version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: feeagro-db
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: feeagro
      POSTGRES_PASSWORD: feeagro123
      POSTGRES_DB: feeagro
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
